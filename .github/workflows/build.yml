name: package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch or tag to build"
        required: false
        default: "main"
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - windows-x86_64
          - linux-x86_64
          - macos-x86_64
          - macos-arm64
      version:
        description: "Release version"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "23.11.0"

jobs:
  build:
    runs-on: ${{ fromJson('{"windows-x86_64":"ubuntu-latest","linux-x86_64":"ubuntu-latest","macos-x86_64":"macos-15-intel","macos-arm64":"macos-14"}')[inputs.platform] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install build deps (Windows target)
        if: ${{ inputs.platform == 'windows-x86_64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 zip unzip

      - name: Install build deps (Linux target)
        if: ${{ inputs.platform == 'linux-x86_64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      - name: Build CLI bundle
        run: |
          cd scripts/cli
          npm install
          npm run build

      - name: Download ffmpeg/ffprobe
        run: bash scripts/cli.sh download "${{ inputs.platform }}"

      - name: Build release
        run: bash scripts/cli.sh release "${{ inputs.platform }}" "${{ inputs.version }}"

      - name: Upload packaged zip
        uses: actions/upload-artifact@v6
        with:
          name: pornboss-${{ inputs.version }}-${{ inputs.platform }}-zip
          path: release/pornboss-${{ inputs.version }}-${{ inputs.platform }}.zip
          if-no-files-found: error
